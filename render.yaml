services:
  - type: web
    name: expensio-api
    runtime: docker
    buildCommand: ""
    startCommand: ""
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: BCRYPT_COST
        value: 12
      - key: RESET_TOKEN_TTL_MINUTES
        value: 30
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
